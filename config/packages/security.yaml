framework:
  secret: '%env(APP_SECRET)%'
  http_method_override: false
  csrf_protection:
    enabled: true

  trusted_hosts:
    - localhost
    - '127.0.0.1'
    - '*.local'

  form:
    enabled: true

  validation:
    enabled: true

twig:
  default_path: '%kernel.project_dir%/templates'
  debug: '%kernel.debug%'
  strict_variables: '%kernel.debug%'

security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
      algorithm: auto

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: app_login
        check_path: app_login
      logout:
        path: app_logout
      remember_me:
        secret: '%env(APP_SECRET)%'
        lifetime: 604800

  access_control:
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/dashboard/student, roles: ROLE_STUDENT }
    - { path: ^/dashboard/company, roles: ROLE_COMPANY }
