security:

  # ── Password Hasher ──
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
      algorithm: auto

  # ── User Provider ──
  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  # ── Firewalls ──
  firewalls:

    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    main:
      lazy: true
      provider: app_user_provider

      # Login Form
      form_login:
        login_path: app_login
        check_path: app_login
        username_parameter: _username
        password_parameter: _password
        default_target_path: /dashboard
        always_use_default_target_path: true
        enable_csrf: true

      # Remember Me
      remember_me:
        secret: '%kernel.secret%'
        lifetime: 604800
        remember_me_parameter: _remember_me

      logout:
        path: app_logout
        target: app_home

    # ── Access Control (قواعد الوصول) ──
    # ── access_control:──

    # ── - { path: ^/dashboard, roles: ROLE_STUDENT } ──
    # ── - { path: ^/admin, roles: ROLE_ADMIN } ──

    # ── - { path: ^/$, roles: PUBLIC_ACCESS } ──
  # ──- { path: ^/login, roles: PUBLIC_ACCESS } ──
    # ── Access Control ──
  access_control:
      # صفحات عامة (لا تحتاج تسجيل دخول)
      - { path: ^/$,               roles: PUBLIC_ACCESS }
      - { path: ^/login,           roles: PUBLIC_ACCESS }
      - { path: ^/forgot-password, roles: PUBLIC_ACCESS }

      # نقطة التوزيع — أي مستخدم مسجل
      - { path: ^/dashboard,       roles: IS_AUTHENTICATED_FULLY }

      # لوحة كل دور — محمية بصلاحيتها فقط
      - { path: ^/admin,           roles: ROLE_ADMIN }
      - { path: ^/company,         roles: ROLE_COMPANY }
      - { path: ^/student,         roles: ROLE_STUDENT }