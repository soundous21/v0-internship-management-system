security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    # تصحيح: الربط مع قاعدة البيانات بدلاً من الذاكرة
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    main:
      lazy: true
      provider: app_user_provider # استخدام المزود الجديد
      form_login:
        login_path: app_login
        check_path: app_login
        enable_csrf: true
      logout:
        path: app_logout
        target: app_home

  access_control:
    # تأمين الصفحات بناءً على الأدوار المطلوبة في دفتر الشروط
    - { path: ^/admin, roles: ROLE_ADMIN }
    - { path: ^/author, roles: ROLE_AUTHOR }
    - { path: ^/organizer, roles: ROLE_ORGANIZER }