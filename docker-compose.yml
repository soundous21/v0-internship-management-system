version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stag_db
      MYSQL_USER: stag_user
      MYSQL_PASSWORD: stag_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  php:
    image: php:8.2-fpm
    volumes:
      - .:/var/www/stag
    working_dir: /var/www/stag
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://stag_user:stag_password@mysql:3306/stag_db

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/stag
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mysql_data:
